version: "3.8"

services:
  app:
    image: stargazyp2/spring-sns:${DOCKER_IMAGE_TAG:-latest}
    container_name: spring-sns-app
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/member?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul

      # 업로드 경로
      UPLOAD_BASE_DIR: /app/uploads
      UPLOAD_POSTS_DIR: /app/uploads/posts
      UPLOAD_PROFILE_DIR: /app/uploads/static
      UPLOAD_MESSAGES_DIR: /app/uploads/static

    volumes:
      - ./uploads:/app/uploads

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - spring_sns_network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  mysql:
    image: mysql:8.0
    container_name: spring-sns-mysql
    restart: unless-stopped

    # ❗ 운영에서는 외부 포트 제거
    # ports:
    #   - "3306:3306"

    env_file:
      - .env

    environment:
      MYSQL_DATABASE: member
      TZ: Asia/Seoul

    volumes:
      - mysql_data:/var/lib/mysql
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

    networks:
      - spring_sns_network

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  spring_sns_network:
    driver: bridge


volumes:
  mysql_data: