name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: '19'
  MAVEN_VERSION: '3.9.5'
  DOCKER_IMAGE_NAME: spring-sns
  DOCKER_REGISTRY: docker.io

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./inhatc
        run: |
          mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./inhatc
        run: |
          mvn test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: inhatc/target/*.jar
          retention-days: 7

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials (support both secret names)
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKER_LOGIN_USERNAME=${DOCKERHUB_USERNAME}" >> "$GITHUB_ENV"
            echo "DOCKER_LOGIN_PASSWORD=${DOCKERHUB_TOKEN}" >> "$GITHUB_ENV"
          elif [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
            echo "DOCKER_LOGIN_USERNAME=${DOCKER_USERNAME}" >> "$GITHUB_ENV"
            echo "DOCKER_LOGIN_PASSWORD=${DOCKER_PASSWORD}" >> "$GITHUB_ENV"
          else
            echo "Docker Hub credentials are not configured. Set DOCKERHUB_USERNAME/DOCKERHUB_TOKEN or DOCKER_USERNAME/DOCKER_PASSWORD."
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_LOGIN_USERNAME }}
          password: ${{ env.DOCKER_LOGIN_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_LOGIN_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./inhatc
          file: ./inhatc/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-docker-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Webhook (Fast)
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "Webhook을 통한 즉각 배포 시도... (브랜치 ${{ github.ref }})"
          payload="{\"ref\":\"${{ github.ref }}\",\"head_commit\":{\"id\":\"${{ github.sha }}\"},\"repository\":{\"full_name\":\"${{ github.repository }}\",\"name\":\"${{ github.event.repository.name }}\"}}"
          if [ -z "${WEBHOOK_SECRET}" ]; then
            echo "❌ WEBHOOK_SECRET이 설정되지 않았습니다. Repository secrets에 WEBHOOK_SECRET을 추가해야 Webhook 배포가 가능합니다."
            exit 1
          fi

          signature="sha256=$(printf '%s' "${payload}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" -hex | awk '{print $2}')"
          sig_header_value="X-Hub-Signature-256: ${signature}"

          # 웹훅은 202로 즉시 응답(배포는 서버에서 비동기). 연결만 느릴 때를 대비해 여유 있게 둠.
          curl -X POST "http://${{ secrets.SSH_HOST }}:3000/webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            ${sig_header_value:+-H "${sig_header_value}"} \
            -d "${payload}" \
            --max-time 60 \
            --connect-timeout 15 \
            -f || (echo "⚠️ Webhook 호출 실패, SSH 배포로 대체합니다" && exit 1)

      - name: Deploy to server via SSH (Fallback)
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # appleboy/ssh-action 기본 포트는 22입니다. secrets.SSH_PORT가 없으면 생략됩니다.
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            BRANCH='${{ github.ref_name }}'
            set -e
            REPO=""
            for d in "$HOME/포트폴리오/spring_sns_git" "$HOME/spring_sns_git"; do
              if [ -d "$d/.git" ]; then REPO="$d"; break; fi
            done
            PORTFOLIO=""
            for d in "$HOME/포트폴리오/portfolio" "$HOME/portfolio"; do
              if [ -f "$d/docker-compose.yml" ]; then PORTFOLIO="$d"; break; fi
            done
            if [ -z "$REPO" ]; then echo "spring_sns_git 저장소(.git)를 찾을 수 없습니다."; exit 1; fi
            if [ -z "$PORTFOLIO" ]; then echo "portfolio/docker-compose.yml 을 찾을 수 없습니다."; exit 1; fi
            echo "==> SSH fallback: git pull ($REPO) + portfolio spring ($PORTFOLIO)"
            cd "$REPO"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            cd "$PORTFOLIO"
            docker compose --project-directory "$PORTFOLIO" -f "$PORTFOLIO/docker-compose.yml" build spring
            docker compose --project-directory "$PORTFOLIO" -f "$PORTFOLIO/docker-compose.yml" up -d spring
            docker compose --project-directory "$PORTFOLIO" -f "$PORTFOLIO/docker-compose.yml" ps spring
            docker compose --project-directory "$PORTFOLIO" -f "$PORTFOLIO/docker-compose.yml" logs --tail=80 spring

